<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TO-DO-LIST</title>
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <header>
        <h1>TO-DO LIST</h1>
    </header>
    <main>
        <div>
            <form action="">
                <div id="painel">
                    <h2>Cadastro de Tarefas</h2>
                    <p><label for="name">Nome: </label><input type="text" id="name"></p>
                    <p><label for="category">Categoria: </label><input type="text" id="category"></p>
                    <p><label for="level">Nível de prioridade: </label>
                        <select id="level">
                            <option value="high">Alta</option>
                            <option value="medium">Média</option>
                            <option value="low">Baixa</option>
                        </select>
                    </p>
                    <p><label for="limit_date">Data limite: </label><input type="date" id="limit_date"></p>
                    <input type="button" name="btn_create" id="btn_create" value="Criar">
                    <input type="button" name="btn_cancel" id="btn_cancel" value="Cancelar">
                </div>
            </form>
        </div>
        <div id="tarefas">
            <h2 id="status">Sem tarefas registradas.</h2>
            <div id="task_viewer">
            </div>
        </div>
    </main>
    <footer>
        <p>Xvierdev</p>
        <p>2026</p>
    </footer>
    <script src="./scripts/script.js"></script>
</body>

</html>
